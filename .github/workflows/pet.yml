name: Render tamagotchi pet

on:
  schedule:
    - cron: "30 2 * * *"  # daily at 02:30 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-commit
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: render images/pet.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/pet.py

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/pet.svg
          git diff --staged --quiet || git commit -m "chore: feed the tamagotchi"
          git fetch origin main
          git rebase origin/main || { git rebase --abort; echo 'rebase failed'; exit 1; }
          git push
