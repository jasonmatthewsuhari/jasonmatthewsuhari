name: Joke of the day

on:
  schedule:
    - cron: "0 16 * * *"  # 16:00 UTC = 00:00 SGT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  joke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pick today's joke
        run: python scripts/joke.py --readme README.md

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: joke of the day"
          git push
