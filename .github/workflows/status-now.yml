name: Update NOW ticker

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write


concurrency:
  group: profile-commit
  cancel-in-progress: false

jobs:
  update-now:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: update NOW block
        run: python scripts/now.py --readme README.md

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update NOW ticker"
          git fetch origin main
          git rebase origin/main || { git rebase --abort; echo 'rebase failed'; exit 1; }
          git push
