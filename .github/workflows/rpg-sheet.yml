name: Render RPG character sheet

on:
  schedule:
    - cron: "15 2 * * *"  # daily at 02:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: render images/rpg-sheet.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/rpg_sheet.py

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/rpg-sheet.svg
          git diff --staged --quiet || git commit -m "chore: update rpg character sheet"
          git push
