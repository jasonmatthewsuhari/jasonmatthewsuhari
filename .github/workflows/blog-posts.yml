# 🥚 EGG 3/7: blog posts travel on RSS. egg 4 hides in contribution-art/draw.py
# somewhere in a comment — not the top one. keep reading.
name: Latest Blog Posts

on:
  schedule:
    - cron: "0 2 * * *" # runs daily at 2:00 UTC
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest
    name: Update README with latest blog posts
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@jasonmatthewsuhari"
          max_post_count: 5
          template: "$newline- [$title]($url) — *$date*"
          comment_tag_name: "BLOG-POST-LIST"
