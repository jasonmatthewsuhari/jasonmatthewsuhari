name: Render Singapore weather card

on:
  schedule:
    - cron: "7 * * * *"  # every hour at :07
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-weather
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: render images/sg-card.svg
        run: python scripts/weather.py

      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/sg-card.svg
          git diff --staged --quiet || git commit -m "chore: refresh weather card"
          git push
