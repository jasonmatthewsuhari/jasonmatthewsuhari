<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" role="img" aria-label="character sheet loading">
  <title>jason.character_sheet.svg — loading</title>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#1d2021"/>
    </linearGradient>
  </defs>
  <rect width="820" height="520" fill="url(#panel)" rx="14"/>
  <rect x="0.5" y="0.5" width="819" height="519" rx="14" fill="none" stroke="#3c3836"/>

  <g font-family="ui-monospace,'Fira Code','JetBrains Mono',monospace" text-anchor="middle">
    <text x="410" y="210" font-size="22" fill="#fabd2f" font-weight="900">CHARACTER SHEET · /home/jason</text>
    <text x="410" y="248" font-size="13" fill="#928374">class: DATA_SCIENTIST · subclass: INDIE_DEV · alignment: chaotic-neutral</text>

    <text x="410" y="298" font-size="14" fill="#b8bb26">[ summoning stats from the GitHub API ]</text>

    <!-- breathing dots -->
    <g font-size="28" fill="#fabd2f">
      <text x="390" y="340">·
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
      </text>
      <text x="410" y="340">·
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
      </text>
      <text x="430" y="340">·
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
      </text>
    </g>

    <text x="410" y="400" font-size="11" fill="#665c54">first workflow run will populate this · wait ~24h or dispatch manually</text>
  </g>
</svg>
