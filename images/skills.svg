<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" role="img" aria-label="skills bars animated">
  <title>skills - animated bars</title>
  <defs>
    <linearGradient id="barBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#3c3836"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="pyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8bb26"/><stop offset="100%" stop-color="#8ec07c"/>
    </linearGradient>
    <linearGradient id="tsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56B4E9"/><stop offset="100%" stop-color="#83a598"/>
    </linearGradient>
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fabd2f"/><stop offset="100%" stop-color="#F0E442"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d5c4a1"/><stop offset="100%" stop-color="#ebdbb2"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072B2"/><stop offset="100%" stop-color="#458588"/>
    </linearGradient>
    <linearGradient id="ptGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D55E00"/><stop offset="100%" stop-color="#fb4934"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009E73"/><stop offset="100%" stop-color="#8ec07c"/>
    </linearGradient>
    <linearGradient id="godotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC79A7"/><stop offset="100%" stop-color="#d3869b"/>
    </linearGradient>
    <filter id="sglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #1d2021; }
    .label { font-family: ui-monospace,'Fira Code','JetBrains Mono',monospace; font-size: 14px; fill: #ebdbb2; }
    .pct   { font-family: ui-monospace,'Fira Code','JetBrains Mono',monospace; font-size: 13px; fill: #a89984; }
    .title { font-family: ui-monospace,'Fira Code','JetBrains Mono',monospace; font-size: 16px; font-weight: 700; fill: #fabd2f; }
    .sub   { font-family: ui-monospace,'Fira Code','JetBrains Mono',monospace; font-size: 11px; fill: #928374; }
  </style>

  <rect class="bg" width="760" height="440" rx="14"/>
  <rect x="0.5" y="0.5" width="759" height="439" rx="14" fill="none" stroke="#3c3836"/>

  <text x="24" y="34" class="title">$ cat ~/.jason/skills.yaml</text>
  <text x="24" y="52" class="sub">// bars animate on load — refresh tab to replay</text>

  <!-- row template: label | track | bar | pct -->
  <!-- each bar animates its width from 0 to target, fill=freeze -->

  <!-- Python 92% -->
  <g transform="translate(24,76)">
    <text x="0" y="14" class="label">python</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#pyGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="478.4" begin="0.1s" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">92%
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- TypeScript 76% -->
  <g transform="translate(24,108)">
    <text x="0" y="14" class="label">typescript</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#tsGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="395.2" begin="0.25s" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">76%
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- JavaScript 80% -->
  <g transform="translate(24,140)">
    <text x="0" y="14" class="label">javascript</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#jsGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="416" begin="0.4s" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">80%
      <animate attributeName="opacity" from="0" to="1" begin="1.75s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- C 58% -->
  <g transform="translate(24,172)">
    <text x="0" y="14" class="label">c</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#cGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="301.6" begin="0.55s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">58%
      <animate attributeName="opacity" from="0" to="1" begin="1.85s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- R 52% -->
  <g transform="translate(24,204)">
    <text x="0" y="14" class="label">R</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#rGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="270.4" begin="0.7s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">52%
      <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- PyTorch 70% -->
  <g transform="translate(24,244)">
    <text x="0" y="14" class="label">pytorch</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#ptGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="364" begin="0.85s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">70%
      <animate attributeName="opacity" from="0" to="1" begin="2.15s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- Next.js / React 74% -->
  <g transform="translate(24,276)">
    <text x="0" y="14" class="label">next.js</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#reactGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="384.8" begin="1.0s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">74%
      <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- Godot 65% -->
  <g transform="translate(24,308)">
    <text x="0" y="14" class="label">godot</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="url(#godotGrad)" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="338" begin="1.15s" dur="1.4s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">65%
      <animate attributeName="opacity" from="0" to="1" begin="2.45s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- separator + "soft skills" section -->
  <line x1="24" y1="344" x2="736" y2="344" stroke="#3c3836" stroke-dasharray="4,4"/>
  <text x="24" y="368" class="title">$ cat ~/.jason/soft.yaml</text>

  <!-- pixel art (crafted hobby) -->
  <g transform="translate(24,380)">
    <text x="0" y="14" class="label">pixel art</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="#CC79A7" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="426.4" begin="1.3s" dur="1.3s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">82%
      <animate attributeName="opacity" from="0" to="1" begin="2.55s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- cooking -->
  <g transform="translate(24,412)">
    <text x="0" y="14" class="label">cooking</text>
    <rect x="120" y="2" width="520" height="16" rx="8" fill="url(#barBg)"/>
    <rect x="120" y="2" width="0" height="16" rx="8" fill="#E69F00" filter="url(#sglow)">
      <animate attributeName="width" from="0" to="468" begin="1.45s" dur="1.3s" fill="freeze" calcMode="spline" keySplines="0.22 0.61 0.36 1"/>
    </rect>
    <text x="654" y="14" class="pct" opacity="0">90%
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.3s" fill="freeze"/>
    </text>
  </g>
</svg>
