<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <title>egg 1/7</title>
  <rect width="500" height="300" fill="#1d2021" rx="8"/>
  <rect x="6" y="6" width="488" height="288" rx="6" fill="none" stroke="#fabd2f" stroke-width="1" stroke-dasharray="3,3"/>
  <g font-family="ui-monospace,'Fira Code',monospace" fill="#ebdbb2">
    <text x="24" y="40" font-size="14" fill="#928374">// ~/.eggs/01.svg</text>
    <text x="24" y="80" font-size="20" fill="#fabd2f" font-weight="700">🥚 egg 1 of 7 — "signal in the static"</text>

    <text x="24" y="120" font-size="13" fill="#ebdbb2">congrats, you noticed the invisible text.</text>
    <text x="24" y="140" font-size="13" fill="#ebdbb2">there are 6 more. each lives inside the profile</text>
    <text x="24" y="160" font-size="13" fill="#ebdbb2">somewhere — comments, alt text, forgotten branches.</text>

    <text x="24" y="200" font-size="14" fill="#b8bb26">next clue:</text>
    <text x="24" y="222" font-size="13" fill="#d5c4a1">the terminal at the top of the README is booting up.</text>
    <text x="24" y="240" font-size="13" fill="#d5c4a1">its source file has a line that doesn't render. that's</text>
    <text x="24" y="258" font-size="13" fill="#d5c4a1">where egg 2 hides. view-source matters.</text>

    <text x="24" y="284" font-size="11" fill="#928374">(hint: &lt;!-- --&gt; is not a comment to us, it's a map.)</text>
  </g>
</svg>
