<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <title>egg 7/7 — you found them all</title>
  <defs>
    <linearGradient id="victory" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fabd2f"/>
      <stop offset="50%"  stop-color="#E69F00"/>
      <stop offset="100%" stop-color="#CC79A7"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#fabd2f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fabd2f" stop-opacity="0"/>
    </radialGradient>
    <filter id="vglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="400" fill="#1d2021" rx="10"/>
  <rect x="640" y="0" width="0" height="400"/>
  <circle cx="320" cy="170" r="220" fill="url(#halo)">
    <animate attributeName="r" values="180;220;180" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- crown / trophy pixel art -->
  <g transform="translate(280,60)" filter="url(#vglow)">
    <!-- trophy cup -->
    <rect x="16" y="0"  width="48" height="6" fill="url(#victory)"/>
    <rect x="12" y="6"  width="56" height="36" fill="url(#victory)"/>
    <rect x="8"  y="12" width="8"  height="18" fill="url(#victory)"/>
    <rect x="64" y="12" width="8"  height="18" fill="url(#victory)"/>
    <rect x="20" y="42" width="40" height="6" fill="url(#victory)"/>
    <rect x="28" y="48" width="24" height="10" fill="url(#victory)"/>
    <rect x="16" y="58" width="48" height="6" fill="url(#victory)"/>
  </g>

  <g font-family="ui-monospace,'Fira Code',monospace" text-anchor="middle">
    <text x="320" y="180" font-size="24" font-weight="900" fill="#fabd2f" filter="url(#vglow)">🥚 egg 7 of 7 🥚</text>
    <text x="320" y="212" font-size="18" font-weight="700" fill="url(#victory)">you found them all</text>
    <text x="320" y="248" font-size="13" fill="#ebdbb2">no idea what to do with this but it impressed me.</text>
    <text x="320" y="268" font-size="13" fill="#ebdbb2">dm me on github for a sticker (or a coffee ☕).</text>
    <text x="320" y="304" font-size="12" fill="#a89984">— jason</text>
    <text x="320" y="358" font-size="10" fill="#928374">achievement unlocked: PROFILE ARCHAEOLOGIST</text>
    <text x="320" y="374" font-size="10" fill="#928374">+9999 XP, +1 internet friend</text>
  </g>
</svg>
